name: Generate Wallpapers

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" >> .env
          echo "FANART_API_KEY=${{ secrets.FANART_API_KEY }}" >> .env
          echo "MDBLIST_API_KEY=${{ secrets.MDBLIST_API_KEY }}" >> .env

      - name: Run generate script
        run: |
          bash generate.sh 213 network
          bash generate.sh 90733 company
          bash generate.sh --url "snoak/top-2000s-movies" --sort released.desc
          

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add collections/
          git diff --staged --quiet || git commit -m "Auto-generated wallpapers"
          git push
